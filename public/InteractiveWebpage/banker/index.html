<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>银行家算法可视化教学工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
        }

        h2 {
            color: #555;
            margin: 25px 0 15px;
            font-size: 20px;
            font-weight: 500;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .config-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            font-weight: 500;
            color: #555;
        }

        input[type="number"] {
            width: 80px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-warning {
            background: #ffc107;
            color: #333;
        }

        .btn-warning:hover {
            background: #e0a800;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .matrix-input {
            overflow-x: auto;
            margin: 15px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border: 1px solid #dee2e6;
        }

        th {
            background: #667eea;
            color: white;
            font-weight: 500;
        }

        td input {
            width: 60px;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
        }

        .result-table {
            margin: 20px 0;
        }

        .result-table th {
            background: #764ba2;
        }

        .step-display {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #667eea;
        }

        .step-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .step-content {
            color: #555;
            line-height: 1.6;
        }

        .safe-sequence {
            background: #d4edda;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #28a745;
        }

        .unsafe-sequence {
            background: #f8d7da;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #dc3545;
        }

        .highlight-row {
            background: #fff3cd !important;
            animation: highlight 1s;
        }

        @keyframes highlight {
            0% { background: #fff3cd; }
            50% { background: #ffeaa7; }
            100% { background: #fff3cd; }
        }

        .status-matrix {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px 0;
        }

        .matrix-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .matrix-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .request-section {
            background: #f0f8ff;
            padding: 20px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .request-step {
            background: white;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border-left: 4px solid #ddd;
        }

        .request-step.pass {
            border-left-color: #28a745;
            background: #d4edda;
        }

        .request-step.fail {
            border-left-color: #dc3545;
            background: #f8d7da;
        }

        .vector-display {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 10px 0;
        }

        .vector-item {
            padding: 8px 15px;
            background: #e9ecef;
            border-radius: 4px;
            font-weight: 500;
        }

        .animation-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            min-height: 100px;
            border: 2px dashed #ddd;
        }

        .process-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #667eea;
            color: white;
            border-radius: 4px;
            margin: 2px;
            font-size: 12px;
        }

        .work-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #28a745;
            color: white;
            border-radius: 4px;
            margin: 2px;
            font-size: 12px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 1024px) {
            .status-matrix {
                grid-template-columns: 1fr;
            }
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>银行家算法可视化教学工具</h1>

        <div class="section">
            <h2>1. 基本配置</h2>
            <div class="config-row">
                <div class="input-group">
                    <label>进程数：</label>
                    <input type="number" id="processCount" value="5" min="1" max="10">
                </div>
                <div class="input-group">
                    <label>资源类型数：</label>
                    <input type="number" id="resourceCount" value="3" min="1" max="10">
                </div>
                <button class="btn-primary" onclick="initMatrices()">初始化矩阵</button>
                <button class="btn-warning" onclick="loadExample()">加载24-25真题</button>
            </div>
        </div>

        <div class="section">
            <h2>2. 输入矩阵</h2>
            <div class="grid-2">
                <div>
                    <h3>Max 矩阵</h3>
                    <div class="matrix-input" id="maxMatrixContainer"></div>
                </div>
                <div>
                    <h3>Allocation 矩阵</h3>
                    <div class="matrix-input" id="allocationMatrixContainer"></div>
                </div>
            </div>
            <div style="margin-top: 20px;">
                <h3>Available 向量</h3>
                <div class="vector-display" id="availableContainer"></div>
            </div>
        </div>

        <div class="section">
            <h2>3. Need 矩阵计算</h2>
            <button class="btn-success" onclick="calculateNeed()">计算 Need</button>
            <div class="matrix-input" id="needMatrixContainer"></div>
        </div>

        <div class="section">
            <h2>4. 安全性检查</h2>
            <button class="btn-primary" onclick="runSafetyAlgorithm()">运行安全性算法</button>
            <div class="animation-box" id="safetyAnimation">
                <p style="color: #999; text-align: center;">点击"运行安全性算法"查看动画演示</p>
            </div>
        </div>

        <div class="section">
            <h2>5. 资源请求模拟</h2>
            <div class="request-section">
                <div class="config-row">
                    <div class="input-group">
                        <label>选择进程：</label>
                        <select id="requestProcess" style="padding: 8px; border-radius: 4px; border: 1px solid #ddd;">
                        </select>
                    </div>
                    <div class="input-group">
                        <label>请求向量：</label>
                        <div id="requestVectorContainer" style="display: flex; gap: 5px;"></div>
                    </div>
                    <button class="btn-success" onclick="handleRequest()">处理请求</button>
                </div>
                <div id="requestResult"></div>
            </div>
        </div>

        <div class="section">
            <h2>6. 当前状态</h2>
            <div class="status-matrix">
                <div class="matrix-card">
                    <h3>Max 矩阵</h3>
                    <div id="maxDisplay"></div>
                </div>
                <div class="matrix-card">
                    <h3>Allocation 矩阵</h3>
                    <div id="allocationDisplay"></div>
                </div>
                <div class="matrix-card">
                    <h3>Need 矩阵</h3>
                    <div id="needDisplay"></div>
                </div>
                <div class="matrix-card">
                    <h3>Available 向量</h3>
                    <div id="availableDisplay"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let processCount = 5;
        let resourceCount = 3;
        let maxMatrix = [];
        let allocationMatrix = [];
        let needMatrix = [];
        let available = [];

        function initMatrices() {
            processCount = parseInt(document.getElementById('processCount').value);
            resourceCount = parseInt(document.getElementById('resourceCount').value);

            maxMatrix = Array(processCount).fill().map(() => Array(resourceCount).fill(0));
            allocationMatrix = Array(processCount).fill().map(() => Array(resourceCount).fill(0));
            needMatrix = Array(processCount).fill().map(() => Array(resourceCount).fill(0));
            available = Array(resourceCount).fill(0);

            renderMaxMatrix();
            renderAllocationMatrix();
            renderAvailable();
            renderRequestVector();
            updateProcessSelect();
            clearDisplays();
        }

        function renderMaxMatrix() {
            const container = document.getElementById('maxMatrixContainer');
            let html = '<table><thead><tr><th>进程</th>';
            for (let j = 0; j < resourceCount; j++) {
                html += `<th>资源${String.fromCharCode(65 + j)}</th>`;
            }
            html += '</tr></thead><tbody>';
            for (let i = 0; i < processCount; i++) {
                html += `<tr><td>P${i + 1}</td>`;
                for (let j = 0; j < resourceCount; j++) {
                    html += `<td><input type="number" min="0" value="${maxMatrix[i][j]}" onchange="updateMaxMatrix(${i}, ${j}, this.value)"></td>`;
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function renderAllocationMatrix() {
            const container = document.getElementById('allocationMatrixContainer');
            let html = '<table><thead><tr><th>进程</th>';
            for (let j = 0; j < resourceCount; j++) {
                html += `<th>资源${String.fromCharCode(65 + j)}</th>`;
            }
            html += '</tr></thead><tbody>';
            for (let i = 0; i < processCount; i++) {
                html += `<tr><td>P${i + 1}</td>`;
                for (let j = 0; j < resourceCount; j++) {
                    html += `<td><input type="number" min="0" value="${allocationMatrix[i][j]}" onchange="updateAllocationMatrix(${i}, ${j}, this.value)"></td>`;
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function renderAvailable() {
            const container = document.getElementById('availableContainer');
            let html = '';
            for (let j = 0; j < resourceCount; j++) {
                html += `<div class="vector-item">资源${String.fromCharCode(65 + j)}: <input type="number" min="0" value="${available[j]}" onchange="updateAvailable(${j}, this.value)" style="width: 60px; padding: 4px; border: 1px solid #ddd; border-radius: 4px;"></div>`;
            }
            container.innerHTML = html;
        }

        function renderRequestVector() {
            const container = document.getElementById('requestVectorContainer');
            let html = '';
            for (let j = 0; j < resourceCount; j++) {
                html += `<input type="number" min="0" value="0" id="request_${j}" style="width: 60px; padding: 6px; border: 1px solid #ddd; border-radius: 4px; text-align: center;">`;
            }
            container.innerHTML = html;
        }

        function updateProcessSelect() {
            const select = document.getElementById('requestProcess');
            let html = '';
            for (let i = 0; i < processCount; i++) {
                html += `<option value="${i}">P${i + 1}</option>`;
            }
            select.innerHTML = html;
        }

        function updateMaxMatrix(i, j, value) {
            maxMatrix[i][j] = parseInt(value) || 0;
        }

        function updateAllocationMatrix(i, j, value) {
            allocationMatrix[i][j] = parseInt(value) || 0;
        }

        function updateAvailable(j, value) {
            available[j] = parseInt(value) || 0;
        }

        function loadExample() {
            processCount = 5;
            resourceCount = 3;
            document.getElementById('processCount').value = 5;
            document.getElementById('resourceCount').value = 3;

            maxMatrix = [
                [8, 6, 4],
                [4, 3, 3],
                [10, 1, 3],
                [3, 3, 3],
                [5, 4, 6]
            ];

            allocationMatrix = [
                [1, 2, 1],
                [3, 1, 1],
                [4, 1, 3],
                [3, 2, 2],
                [1, 1, 3]
            ];

            available = [2, 1, 1];

            renderMaxMatrix();
            renderAllocationMatrix();
            renderAvailable();
            renderRequestVector();
            updateProcessSelect();
            clearDisplays();
        }

        function calculateNeed() {
            needMatrix = [];
            for (let i = 0; i < processCount; i++) {
                needMatrix[i] = [];
                for (let j = 0; j < resourceCount; j++) {
                    needMatrix[i][j] = maxMatrix[i][j] - allocationMatrix[i][j];
                }
            }
            renderNeedMatrix();
            updateDisplays();
        }

        function renderNeedMatrix() {
            const container = document.getElementById('needMatrixContainer');
            let html = '<table class="result-table"><thead><tr><th>进程</th>';
            for (let j = 0; j < resourceCount; j++) {
                html += `<th>资源${String.fromCharCode(65 + j)}</th>`;
            }
            html += '</tr></thead><tbody>';
            for (let i = 0; i < processCount; i++) {
                html += `<tr><td>P${i + 1}</td>`;
                for (let j = 0; j < resourceCount; j++) {
                    html += `<td>${needMatrix[i][j]}</td>`;
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function updateDisplays() {
            renderMatrixDisplay('maxDisplay', maxMatrix, 'Max');
            renderMatrixDisplay('allocationDisplay', allocationMatrix, 'Allocation');
            renderMatrixDisplay('needDisplay', needMatrix, 'Need');
            renderVectorDisplay('availableDisplay', available, 'Available');
        }

        function renderMatrixDisplay(containerId, matrix, name) {
            const container = document.getElementById(containerId);
            let html = '<table><thead><tr><th>进程</th>';
            for (let j = 0; j < resourceCount; j++) {
                html += `<th>资源${String.fromCharCode(65 + j)}</th>`;
            }
            html += '</tr></thead><tbody>';
            for (let i = 0; i < matrix.length; i++) {
                html += `<tr><td>P${i + 1}</td>`;
                for (let j = 0; j < matrix[i].length; j++) {
                    html += `<td>${matrix[i][j]}</td>`;
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function renderVectorDisplay(containerId, vector, name) {
            const container = document.getElementById(containerId);
            let html = '<div class="vector-display">';
            for (let j = 0; j < vector.length; j++) {
                html += `<div class="vector-item">资源${String.fromCharCode(65 + j)}: ${vector[j]}</div>`;
            }
            html += '</div>';
            container.innerHTML = html;
        }

        function clearDisplays() {
            document.getElementById('needMatrixContainer').innerHTML = '';
            document.getElementById('safetyAnimation').innerHTML = '<p style="color: #999; text-align: center;">点击"运行安全性算法"查看动画演示</p>';
            document.getElementById('requestResult').innerHTML = '';
            updateDisplays();
        }

        function runSafetyAlgorithm() {
            calculateNeed();

            const work = [...available];
            const finish = Array(processCount).fill(false);
            const safeSequence = [];
            const animationContainer = document.getElementById('safetyAnimation');
            let animationHtml = '';

            animationHtml += '<div class="step-display"><div class="step-title">初始化</div>';
            animationHtml += '<div class="step-content">';
            animationHtml += '<p>Work = Available = [' + work.join(', ') + ']</p>';
            animationHtml += '<p>Finish = [' + finish.map(f => f ? 'true' : 'false').join(', ') + ']</p>';
            animationHtml += '</div></div>';

            let step = 1;
            let found = true;
            let round = 1;

            while (found && safeSequence.length < processCount) {
                found = false;

                animationHtml += '<div class="step-display"><div class="step-title">第 ' + round + ' 轮扫描</div>';
                animationHtml += '<div class="step-content">';
                animationHtml += '<p>当前 Work = [' + work.join(', ') + ']</p>';
                animationHtml += '</div></div>';

                for (let i = 0; i < processCount; i++) {
                    if (!finish[i]) {
                        const canAllocate = needMatrix[i].every((need, j) => need <= work[j]);

                        if (canAllocate) {
                            found = true;

                            animationHtml += '<div class="step-display" style="border-left-color: #28a745;">';
                            animationHtml += '<div class="step-title">找到可满足进程 P' + (i + 1) + '</div>';
                            animationHtml += '<div class="step-content">';
                            animationHtml += '<p>Need P' + (i + 1) + ' = [' + needMatrix[i].join(', ') + '] &lt;= Work = [' + work.join(', ') + '] ✓</p>';
                            animationHtml += '<p>执行: Work = Work + Allocation P' + (i + 1) + '</p>';
                            animationHtml += '<p>Work = [' + work.join(', ') + '] + [' + allocationMatrix[i].join(', ') + '] = ';

                            for (let j = 0; j < resourceCount; j++) {
                                work[j] += allocationMatrix[i][j];
                            }

                            animationHtml += '[' + work.join(', ') + ']</p>';
                            animationHtml += '<p>Finish[P' + (i + 1) + '] = true</p>';
                            animationHtml += '</div></div>';

                            finish[i] = true;
                            safeSequence.push('P' + (i + 1));
                            break;
                        }
                    }
                }

                round++;
            }

            if (safeSequence.length === processCount) {
                animationHtml += '<div class="safe-sequence">';
                animationHtml += '<strong>系统处于安全状态！</strong><br>';
                animationHtml += '安全序列: &lt;' + safeSequence.join(', ') + '&gt;';
                animationHtml += '</div>';
            } else {
                animationHtml += '<div class="unsafe-sequence">';
                animationHtml += '<strong>系统处于不安全状态！</strong><br>';
                animationHtml += '无法找到完整的安全序列，已执行进程: ' + (safeSequence.length > 0 ? safeSequence.join(', ') : '无');
                animationHtml += '</div>';
            }

            animationContainer.innerHTML = animationHtml;
        }

        function handleRequest() {
            const processIndex = parseInt(document.getElementById('requestProcess').value);
            const request = [];
            for (let j = 0; j < resourceCount; j++) {
                request[j] = parseInt(document.getElementById('request_' + j).value) || 0;
            }

            const resultContainer = document.getElementById('requestResult');
            let html = '';

            html += '<div class="request-step">';
            html += '<strong>步骤1: 检查 Request &lt;= Need</strong><br>';
            html += 'Request = [' + request.join(', ') + ']<br>';
            html += 'Need P' + (processIndex + 1) + ' = [' + needMatrix[processIndex].join(', ') + ']<br>';

            const step1Pass = request.every((r, j) => r <= needMatrix[processIndex][j]);
            if (step1Pass) {
                html += '<span style="color: #28a745;">Request &lt;= Need ✓ 通过</span>';
            } else {
                html += '<span style="color: #dc3545;">Request &lt;= Need ✗ 失败（请求超过需求）</span>';
            }
            html += '</div>';

            html += '<div class="request-step">';
            html += '<strong>步骤2: 检查 Request &lt;= Available</strong><br>';
            html += 'Request = [' + request.join(', ') + ']<br>';
            html += 'Available = [' + available.join(', ') + ']<br>';

            const step2Pass = request.every((r, j) => r <= available[j]);
            if (step2Pass) {
                html += '<span style="color: #28a745;">Request &lt;= Available ✓ 通过</span>';
            } else {
                html += '<span style="color: #dc3545;">Request &lt;= Available ✗ 失败（资源不足）</span>';
            }
            html += '</div>';

            if (step1Pass && step2Pass) {
                html += '<div class="request-step">';
                html += '<strong>步骤3: 试分配并检查安全性</strong><br>';
                html += '执行试分配: Available = Available - Request<br>';
                html += 'Available = [' + available.join(', ') + '] - [' + request.join(', ') + '] = ';

                const tempAvailable = [...available];
                const tempAllocation = allocationMatrix.map(row => [...row]);
                const tempNeed = needMatrix.map(row => [...row]);

                for (let j = 0; j < resourceCount; j++) {
                    tempAvailable[j] -= request[j];
                    tempAllocation[processIndex][j] += request[j];
                    tempNeed[processIndex][j] -= request[j];
                }

                html += '[' + tempAvailable.join(', ') + ']<br>';

                const isSafe = checkSafetyWithTempData(tempAvailable, tempAllocation, tempNeed);
                if (isSafe.safe) {
                    html += '<span style="color: #28a745;">系统处于安全状态 ✓</span><br>';
                    html += '<strong>最终结论: 批准请求</strong><br>';

                    available = tempAvailable;
                    allocationMatrix = tempAllocation;
                    needMatrix = tempNeed;

                    renderAllocationMatrix();
                    renderAvailable();
                    updateDisplays();
                } else {
                    html += '<span style="color: #dc3545;">系统处于不安全状态 ✗</span><br>';
                    html += '<strong>最终结论: 拒绝请求（会导致不安全状态）</strong>';
                }
                html += '</div>';
            } else {
                html += '<div class="request-step fail">';
                html += '<strong>最终结论: 拒绝请求</strong>';
                html += '</div>';
            }

            resultContainer.innerHTML = html;
        }

        function checkSafetyWithTempData(tempAvailable, tempAllocation, tempNeed) {
            const work = [...tempAvailable];
            const finish = Array(processCount).fill(false);
            const safeSequence = [];

            let found = true;
            while (found && safeSequence.length < processCount) {
                found = false;
                for (let i = 0; i < processCount; i++) {
                    if (!finish[i]) {
                        const canAllocate = tempNeed[i].every((need, j) => need <= work[j]);
                        if (canAllocate) {
                            found = true;
                            for (let j = 0; j < resourceCount; j++) {
                                work[j] += tempAllocation[i][j];
                            }
                            finish[i] = true;
                            safeSequence.push('P' + (i + 1));
                            break;
                        }
                    }
                }
            }

            return {
                safe: safeSequence.length === processCount,
                sequence: safeSequence
            };
        }

        initMatrices();
    </script>
</body>
</html>
